name: Build NeoTerm

# Manuálisan indítható build. A GitHub UI-on: Actions → "Build NeoTerm" →
# Run workflow. Előbb lefordítja a proot binárist, majd ezt beágyazva
# (libproot.so) lebuildeli a NeoTerm APK-t. Az APK build függ a proot
# bináristól (needs: build-proot), így csak akkor indul, ha a proot kész.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK build típus"
        type: choice
        default: debug
        options:
          - debug
          - release
      fetch_rootfs:
        description: "disztró-rootfs-ek letöltése + csomagolása (lassú, külön artefaktum)"
        type: boolean
        default: false
      distros:
        description: "rootfs disztrók (szóközzel elválasztva)"
        type: string
        default: "ubuntu alpine kali arch"

env:
  NDK_VERSION: "21.4.7075529"
  CMAKE_VERSION: "3.18.1"

jobs:
  # ── 1) proot bináris — ebből függ az APK ────────────────────────────────
  build-proot:
    name: proot binary (aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu xxd make curl xz-utils zstd file

      # A modern Android cmdline-tools JDK 17-et igényel a sdkmanagerhez.
      - name: Set up JDK 17 (Android SDK tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build proot
        run: |
          chmod +x proot/build-proot.sh
          ./proot/build-proot.sh "${GITHUB_WORKSPACE}/out/proot/aarch64"

      - name: Upload proot binary
        uses: actions/upload-artifact@v4
        with:
          name: proot-aarch64
          path: out/proot/aarch64/proot
          if-no-files-found: error

  # ── 2) NeoTerm APK (a proot binárist beágyazva) ─────────────────────────
  build-apk:
    name: APK (${{ inputs.build_type }})
    needs: build-proot
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      # JDK 17 az Android SDK/NDK telepítő eszközökhöz (sdkmanager)…
      - name: Set up JDK 17 (Android SDK tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}" \
                     "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # …majd JDK 11 a tényleges Gradle buildhez (Gradle 7.0 max Java 16).
      - name: Set up JDK 11 (Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Fetch proot binary
        uses: actions/download-artifact@v4
        with:
          name: proot-aarch64
          path: ${{ github.workspace }}/proot-bin

      - name: Bundle proot into APK (libproot.so)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp "${GITHUB_WORKSPACE}/proot-bin/proot" \
             app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libproot.so
          ls -l app/src/main/jniLibs/arm64-v8a/

      - name: Gradle assemble
        run: |
          chmod +x ./gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --stacktrace
          else
            ./gradlew :app:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neoterm-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  # ── 3) disztró-rootfs-ek (opcionális, lassú) ────────────────────────────
  fetch-rootfs:
    name: rootfs tarballs
    if: ${{ inputs.fetch_rootfs }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl xz-utils zstd tar coreutils

      - name: Fetch + repack rootfs
        run: |
          chmod +x proot/fetch-rootfs.sh
          ./proot/fetch-rootfs.sh "${GITHUB_WORKSPACE}/out" ${{ inputs.distros }} --arch aarch64

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-aarch64
          path: out/rootfs/**
          if-no-files-found: error
